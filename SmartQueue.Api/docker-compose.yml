version: '3.8'

services:
  smartqueue-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartqueue-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    depends_on:
      - smartqueue-sql

  smartqueue-sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartqueue-sql
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - smartqueue_sql_data:/var/opt/mssql

volumes:
  smartqueue_sql_data: